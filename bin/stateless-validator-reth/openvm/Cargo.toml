[workspace]

[package]
name = "stateless-validator-reth-openvm"
version = "0.1.0"
edition = "2024"

[dependencies]
# enable features
alloy-consensus = { version = "1.1.2", default-features = false, features = [
    "crypto-backend",
] }
alloy-primitives = { version = "1.4.1", default-features = false, features = [
    "map-hashbrown",
    "native-keccak",
] }

# revm
revm = { version = "33.1.0", default-features = false }

# openvm
openvm = { git = "https://github.com/openvm-org/openvm.git", tag = "v1.4.2", features = [
    "std",
] }
openvm-algebra-guest = { git = "https://github.com/openvm-org/openvm.git", tag = "v1.4.2" }
openvm-ecc-guest = { git = "https://github.com/openvm-org/openvm.git", tag = "v1.4.2" }
openvm-k256 = { git = "https://github.com/openvm-org/openvm.git", tag = "v1.4.2", package = "k256" }
openvm-keccak256 = { git = "https://github.com/openvm-org/openvm.git", tag = "v1.4.2" }
openvm-p256 = { git = "https://github.com/openvm-org/openvm.git", tag = "v1.4.2", package = "p256" }
openvm-pairing = { git = "https://github.com/openvm-org/openvm.git", tag = "v1.4.2", features = [
    "bn254",
    "bls12_381",
] }
openvm-sha2 = { git = "https://github.com/openvm-org/openvm.git", tag = "v1.4.2" }
openvm-kzg = { git = "https://github.com/axiom-crypto/openvm-kzg.git", rev = "530a6ed413def5296b7e4967650ba4fc8fd92ea1", default-features = false, features = [
    "use-intrinsics",
] }

# ere
ere-platform-openvm = { git = "https://github.com/eth-act/ere", rev = "ec75f8a26657ddbf7efc44cdb3167fff4f55fe27", features = [
    "std",
] }

# local
stateless-validator-reth = { path = "../../../crates/stateless-validator-reth" }

[patch."https://github.com/openvm-org/openvm.git"]
openvm = { git = "https://github.com/openvm-org//openvm.git", tag = "v1.4.2" }
openvm-algebra-complex-macros = { git = "https://github.com/openvm-org//openvm.git", tag = "v1.4.2" }
openvm-algebra-guest = { git = "https://github.com/openvm-org//openvm.git", tag = "v1.4.2" }
openvm-algebra-moduli-macros = { git = "https://github.com/openvm-org//openvm.git", tag = "v1.4.2" }
openvm-custom-insn = { git = "https://github.com/openvm-org//openvm.git", tag = "v1.4.2" }
openvm-ecc-guest = { git = "https://github.com/openvm-org//openvm.git", tag = "v1.4.2" }
openvm-ecc-sw-macros = { git = "https://github.com/openvm-org//openvm.git", tag = "v1.4.2" }
openvm-k256 = { git = "https://github.com/openvm-org//openvm.git", tag = "v1.4.2", package = "k256" }
openvm-keccak256 = { git = "https://github.com/openvm-org//openvm.git", tag = "v1.4.2" }
openvm-keccak256-guest = { git = "https://github.com/openvm-org//openvm.git", tag = "v1.4.2" }
openvm-macros-common = { git = "https://github.com/openvm-org//openvm.git", tag = "v1.4.2" }
openvm-p256 = { git = "https://github.com/openvm-org//openvm.git", tag = "v1.4.2", package = "p256" }
openvm-pairing = { git = "https://github.com/openvm-org//openvm.git", tag = "v1.4.2" }
openvm-pairing-guest = { git = "https://github.com/openvm-org//openvm.git", tag = "v1.4.2" }
openvm-platform = { git = "https://github.com/openvm-org//openvm.git", tag = "v1.4.2" }
openvm-rv32im-guest = { git = "https://github.com/openvm-org//openvm.git", tag = "v1.4.2" }
openvm-sha2 = { git = "https://github.com/openvm-org//openvm.git", tag = "v1.4.2" }
openvm-sha256-guest = { git = "https://github.com/openvm-org//openvm.git", tag = "v1.4.2" }

[patch.crates-io]
ethereum_hashing = { git = "https://github.com/jsign/ethereum_hashing", rev = "08c88633b700d7447ef840d19ce7b369c44311de" }

[profile.release]
codegen-units = 1
lto = "fat"
