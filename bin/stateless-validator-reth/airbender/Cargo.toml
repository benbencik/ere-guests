[workspace]

[package]
name = "stateless-validator-reth-airbender"
version = "0.1.0"
edition = "2024"

[dependencies]
# enable features
alloy-primitives = { version = "1.5.0", default-features = false, features = [
    "map-foldhash",
    "sha3-keccak",
] }
revm = { version = "38.0.0", default-features = false, features = ["bn"] }

# ere
ere-platform-airbender = { git = "https://github.com/eth-act/ere", tag = "v0.8.0", features = [
    "custom_allocator",
] }

# local
stateless-validator-reth = { path = "../../../crates/stateless-validator-reth", default-features = false }

[patch.crates-io]
radium = { git = "https://github.com/han0110/radium", branch = "feature/riscv32ima" }

[profile.release]
codegen-units = 1
lto = "fat"
opt-level = "s"
