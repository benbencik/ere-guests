[workspace]

[package]
name = "stateless-validator-reth-zisk"
version = "0.1.0"
edition = "2024"

[dependencies]
# enable features
alloy-consensus = { version = "2.0.0", default-features = false, features = [
    "crypto-backend",
] }
alloy-primitives = { version = "1.5", default-features = false, features = [
    "map-foldhash",
    "native-keccak",
] }
revm = { version = "38.0.0", default-features = false, features = ["bn"] }

# ere
# NOTE: Using `default-features = false, features = ["inputcpy"]` mainly to disable the other
#       feature enabled by default `user-hints`, which this binary doesn't use but introduces lots
#       of dependencies.
ere-platform-zisk = { git = "https://github.com/eth-act/ere", tag = "v0.11.0", default-features = false, features = [
    "inputcpy",
] }

# local
stateless-validator-reth = { path = "../../../crates/stateless-validator-reth", default-features = false, features = [
    "zisk",
] }

[features]
cycle-scope = ["ere-platform-zisk/cycle-scope"]

[profile.release]
codegen-units = 1
lto = "fat"

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = [
    'cfg(zisk_hints)',
    'cfg(zisk_hints_debug)',
    'cfg(target_vendor, values("zisk"))',
] }
