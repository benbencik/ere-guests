[workspace]

[package]
name = "block-encoding-length-airbender"
version = "0.1.0"
edition = "2024"

[dependencies]
# ere
ere-platform-airbender = { git = "https://github.com/eth-act/ere", tag = "v0.2.0", features = ["custom_allocator"] }

# local
block-encoding-length = { path = "../../../crates/block-encoding-length", default-features = false }

[patch.crates-io]
radium = { git = "https://github.com/han0110/radium", branch = "feature/riscv32ima" }
ethereum_ssz_derive = { git = "https://github.com/han0110/ethereum_ssz", branch = "feature/no-std" }
ethereum_ssz = { git = "https://github.com/han0110/ethereum_ssz", branch = "feature/no-std" }
