[workspace]

[package]
name = "stateless-validator-ethrex-sp1"
edition = "2024"
version = "0.1.0"

[dependencies]
# ere
ere-platform-sp1 = { git = "https://github.com/eth-act/ere", tag = "v0.10.0" }

# local
stateless-validator-ethrex = { path = "../../../crates/stateless-validator-ethrex", features = [
    "std",
    "sp1",
] }

# Copied and modified from https://github.com/lambdaclass/ethrex/blob/main/crates/guest-program/bin/sp1/Cargo.toml#L23-L35.
[patch.crates-io]
sha2-v0-10-9 = { git = "https://github.com/sp1-patches/RustCrypto-hashes", package = "sha2", tag = "patch-sha2-0.10.9-sp1-6.0.0" }
sha3-v0-10-8 = { git = "https://github.com/sp1-patches/RustCrypto-hashes", package = "sha3", tag = "patch-sha3-0.10.8-sp1-6.0.0" }
crypto-bigint = { git = "https://github.com/sp1-patches/RustCrypto-bigint", tag = "patch-0.5.5-sp1-6.0.0" }
tiny-keccak = { git = "https://github.com/sp1-patches/tiny-keccak", tag = "patch-2.0.2-sp1-6.0.0" }
p256 = { git = "https://github.com/sp1-patches/elliptic-curves", tag = "patch-p256-13.2-sp1-6.0.0" }
secp256k1 = { git = "https://github.com/sp1-patches/rust-secp256k1", tag = "patch-0.30.0-sp1-6.0.0" }
k256 = { git = "https://github.com/sp1-patches/elliptic-curves", tag = "patch-k256-13.4-sp1-6.0.0" }
substrate-bn = { git = "https://github.com/sp1-patches/bn", tag = "patch-0.6.0-sp1-6.0.0-substrate-bn" }

# NOTE: Commented out due to different `sp1-lib` version.
# [patch."https://github.com/lambdaclass/bls12_381"]
# bls12_381 = { git = "https://github.com/lambdaclass/bls12_381-patch/", branch = "expose-affine-constructors" }

[profile.release]
codegen-units = 1
lto = "fat"
