[workspace]

[package]
name = "stateless-validator-ethrex-zisk"
edition = "2024"
version = "0.1.0"

[dependencies]
# ere
# NOTE: Using `default-features = false, features = ["inputcpy"]` mainly to disable the other
#       feature enabled by default `user-hints`, which this binary doesn't use but introduces lots
#       of dependencies.
ere-platform-zisk = { git = "https://github.com/eth-act/ere", tag = "v0.5.0", default-features = false, features = ["inputcpy"] }

# local
stateless-validator-ethrex = { path = "../../../crates/stateless-validator-ethrex", features = [
    "std",
    "zisk",
] }

[profile.release]
codegen-units = 1
lto = "fat"
