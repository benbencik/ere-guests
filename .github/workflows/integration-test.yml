name: Integration test

on:
  push:
    branches:
      - main
      - jsign-eip-8025
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test execution of ${{ matrix.guest }} on ${{ matrix.zkvm }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        guest:
          - block-encoding-length
          - empty
          - panic
          - stateless-validator-ethrex
          - stateless-validator-reth
        zkvm:
          - airbender
          - openvm
          - pico
          - risc0
          - sp1
          - zisk
        exclude:
          - guest: stateless-validator-ethrex
            zkvm: airbender
          - guest: stateless-validator-ethrex
            zkvm: openvm
          - guest: stateless-validator-ethrex
            zkvm: pico
        include:
          - zkvm: airbender
            threads: 12
          - zkvm: openvm
            threads: 1
          - zkvm: pico
            threads: 12
          - zkvm: risc0
            threads: 12
          - zkvm: sp1
            threads: 12
          - zkvm: zisk
            threads: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Free up disk space
        if: matrix.zkvm == 'zisk'
        run: bash .github/scripts/free-up-disk-space.sh

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla/sccache-action@v0.0.9

      - name: Configure sccache
        run: |
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache bin target
        uses: actions/cache@v4
        with:
          path: bin/${{ matrix.guest }}/${{ matrix.zkvm }}/target
          key: ${{ runner.os }}-bin-${{ matrix.guest }}-${{ matrix.zkvm }}-${{ hashFiles('bin/${{ matrix.guest }}/${{ matrix.zkvm }}/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-bin-${{ matrix.guest }}-${{ matrix.zkvm }}-

      - name: Test
        env:
          RUST_LOG: info,pico_vm=warn
          RAYON_NUM_THREADS: ${{ matrix.threads }}
          ERE_IMAGE_REGISTRY: ghcr.io/eth-act/ere
        run: |
          cargo test --release --test ${{ matrix.guest }} -- ${{ matrix.zkvm }}

          sudo chown -R $(id -u):$(id -g) bin/${{ matrix.guest }}/${{ matrix.zkvm }}/target || true

      - name: Run sccache stat for check
        shell: bash
        run: ${SCCACHE_PATH} --show-stats
