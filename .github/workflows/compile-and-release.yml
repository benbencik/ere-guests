name: Compile and Release Compiled Guests

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  compile:
    name: Compile ${{ matrix.guest }}-${{ matrix.zkvm }}
    runs-on: ubuntu-latest
    outputs:
      ere_tag: ${{ steps.get_ere_tag.outputs.ere_tag }}
    strategy:
      fail-fast: false
      matrix:
        guest:
          - block-encoding-length
          - empty
          - panic
          - stateless-validator-ethrex
          - stateless-validator-reth
        zkvm:
          - airbender
          - openvm
          - risc0
          - sp1
          - zisk
        exclude:
          - guest: stateless-validator-ethrex
            zkvm: airbender
          - guest: stateless-validator-ethrex
            zkvm: openvm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Free up disk space
        if: matrix.zkvm == 'zisk'
        run: bash .github/scripts/free-up-disk-space.sh

      - name: Get Ere tag
        id: get_ere_tag
        run: |
          ERE_TAG=$(cargo tree -p ere-platform-core | head -n 1 | sed -E -e 's/.*\?rev=(.{7}).*/\1/' -e 's/.*\?tag=v([0-9.]+).*/\1/')
          echo "ere_tag=${ERE_TAG}" >> $GITHUB_OUTPUT
          echo "Ere tag: ${ERE_TAG}"

      - name: Pull Ere images
        run: |
          docker pull ghcr.io/eth-act/ere/ere-compiler-${{ matrix.zkvm }}:${{ steps.get_ere_tag.outputs.ere_tag }}
          docker pull ghcr.io/eth-act/ere/ere-server-${{ matrix.zkvm }}:${{ steps.get_ere_tag.outputs.ere_tag }}

      - name: Compile guest
        run: |
          docker run \
            -e RUST_LOG=info \
            -v $PWD:/ere-guests \
            -v $PWD/output:/output \
            ghcr.io/eth-act/ere/ere-compiler-${{ matrix.zkvm }}:${{ steps.get_ere_tag.outputs.ere_tag }} \
            --compiler-kind rust-customized \
            --guest-dir /ere-guests/bin/${{ matrix.guest }}/${{ matrix.zkvm }} \
            --output-dir /output \
            --elf-name ${{ matrix.guest }}-${{ matrix.zkvm }}.elf

      - name: Generate program VK
        run: |
          docker run \
            -e RUST_LOG=info \
            -v $PWD/output:/output \
            ghcr.io/eth-act/ere/ere-server-${{ matrix.zkvm }}:${{ steps.get_ere_tag.outputs.ere_tag }} \
            --elf-path /output/${{ matrix.guest }}-${{ matrix.zkvm }}.elf \
            keygen \
            --program-vk-path /output/${{ matrix.guest }}-${{ matrix.zkvm }}.vk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.guest }}-${{ matrix.zkvm }}
          path: |
            output/${{ matrix.guest }}-${{ matrix.zkvm }}.elf
            output/${{ matrix.guest }}-${{ matrix.zkvm }}.vk
          if-no-files-found: error

  check-git-tag:
    name: Check whether git tag exists
    needs: compile
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check-git-tag.outputs.exists }}
      tag: ${{ steps.check-git-tag.outputs.tag }}
    steps:
      - name: Check whether tag exists
        id: check-git-tag
        run: |
          TAG=$(git ls-remote --tags "https://github.com/${{ github.repository }}" "v*" \
            | awk '$1 == "${{ github.sha }}" { sub("refs/tags/", "", $2); sub(/\^\{\}$/, "", $2); print $2; exit }')
          echo "exists=$([[ -n "$TAG" ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  update-release-with-artifacts:
    name: Update release with artifacts
    needs: [compile, check-git-tag]
    if: needs.check-git-tag.outputs.exists == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Generate release notes
        run: |
          echo "## Compiled guest programs" > release-body.md
          echo "" >> release-body.md
          echo "This release contains compiled guest programs for various zkVMs." >> release-body.md
          echo "" >> release-body.md
          echo "Built with Ere compiler version: \`${{ needs.compile.outputs.ere_tag }}\`." >> release-body.md
          echo "" >> release-body.md

          RELEASE_URL="https://github.com/${{ github.repository }}/releases/download/${{ needs.check-git-tag.outputs.tag }}"

          # Get unique guest names from .elf files
          declare -A guests
          for file in artifacts/*.elf; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              # Strip the last -zkvm.elf segment to get the guest name
              guest=$(echo "$filename" | sed 's/-[^-]*\.elf$//')
              guests["$guest"]=1
            fi
          done

          # Sort and group by guest
          for guest in $(echo "${!guests[@]}" | tr ' ' '\n' | sort); do
            echo "### $guest" >> release-body.md
            echo "" >> release-body.md
            for elf_file in artifacts/$guest-*.elf; do
              if [ -f "$elf_file" ]; then
                elf_name=$(basename "$elf_file")
                program_vk_name="${elf_name%.elf}.vk"
                echo "- [\`$elf_name\`]($RELEASE_URL/$elf_name) | [\`$program_vk_name\`]($RELEASE_URL/$program_vk_name)" >> release-body.md
              fi
            done
            echo "" >> release-body.md
          done

      - name: Install Minisign
        run: sudo apt-get update && sudo apt-get install -y minisign

      - name: Sign Artifacts
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
          MINISIGN_PUBLIC_KEY: ${{ secrets.MINISIGN_PUBLIC_KEY }}
          MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}
        run: |
          # Create key files from secrets
          echo "$MINISIGN_SECRET_KEY" > minisign.key
          echo "$MINISIGN_PUBLIC_KEY" > minisign.pub

          echo "Starting signing process..."

          # Iterate over artifacts and sign them
          for file in artifacts/*; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              echo "Signing $filename..."

              # -S: Sign, -m: file, -s: secret key, -x: output signature, -t: trusted comment
              # We output the .minisig directly into the artifacts folder so it gets released
              echo "$MINISIGN_PASSWORD" | minisign -Sm "$file" -s minisign.key -x "$file.minisig" -t "$filename"
            fi
          done

          # Move the public key into artifacts so it is included in the release
          cp minisign.pub artifacts/

          # Cleanup secret key
          rm minisign.key

          echo "Signing complete. Contents of artifacts:"
          ls -R artifacts

      - name: Upload artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload --repo "${{ github.repository }}" "${{ needs.check-git-tag.outputs.tag }}" artifacts/* --clobber

      - name: Append artifact info to release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING="$(gh release view --repo "${{ github.repository }}" "${{ needs.check-git-tag.outputs.tag }}" --json body -q .body)"
          gh release edit --repo "${{ github.repository }}" "${{ needs.check-git-tag.outputs.tag }}" --notes "${EXISTING}

          $(cat release-body.md)"
